<!DOCTYPE html>

<html lange="pt-br">
    <head>
       <meta charset="UTF-8">
         <!--
              <meta charset> Define o conjunto de caracteres (enconding) 
              da pagina. UTF-8 garante que acertos e caracteres especiais
               apareçam corretamente.
         -->
         <meta name="viewport" content="width=device-width, initial-scale=1.0">

         <!--
         <meta viewport>:  esta tag é importante para sites de devem funcionar
         em dispositivos móveis (celular). width-device  -> garante que a 
         largura da página vai ser adaptar á largura do dispositivo.
         initial-scale=1 -> não aplica zoom automático ao abrir a página.
         Sem ela o celular vai tentar mostrar a página como se fosse no computador
         -->
        <title>Jogo da Cobrinha</title>

        <!--
        Estilos e CSS vão ficar abaixo desta linha - Próxima aula
        -->

        <style>

            .container{
                text-align: center;
                background-color: rgba(3, 119, 3, 0.842);
                padding: 30px;
                border-radius: 20px;
                box-shadow: 0px 10px 30px rgb(3, 158, 24);
            }
 
            .info{
                font-size: 1em;
            }

            .pontuacao{
               font-weight: bold;
               color:rgb(0, 0, 0);
            }

            .recorde {
                font-weight: bold;
                color: #a72839; 
                }

            #canvas{
                border: 3px solid #000000;
                border-radius: 10px;
                background-color: rgb(129, 247, 145);
                display: block;

                margin: 20px auto;
                box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);

            }

            .controles {
                margin-top: 20px;
            }

            button{
                font-size: 16px;
                cursor: pointer;
                background-color:rgb(59, 185, 0);
                
                padding: 12px 25px;
                color: white;
                border: none;
                border-radius: 8px;
                margin: 5px;
                transition: all 0.3s ease;


            }

            .teclas{
                display: grid;
                grid-template-columns: repeat(3, 50px);
                gap: 5px;
                justify-content: center;
                margin: 15px auto;

            }

            .tecla{
                width: 50px;
                height: 50px;
                background-color: darkgreen;
                color: #000000;
                border: none;
                cursor: pointer;
                border-radius: 5px;
                font-size: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: bold;
            }

            .tecla.active{
                background-color: darkgreen;
                
            }
 

             .tecla.vazio{ 
                  background-color: transparent;
                   cursor: default;

            }

            .instrucoes{
                margin-top:  20px;
                padding: 15px;
                background-color: rgb(39, 170, 45);
                border-radius: 10px;
                font-size: 14px;
                color: #000;

            }

            .instrucoes h3{
                margin-bottom: 10px;
                color: #333;
            }

        </style>

    </head>
    <body> 

        <div   class="container">
            <h1> &#128013; Jogo da Cobrinha 🍎​  </h1>

            <div class="info"> 

                <div class="pontuacao"> 
                    Pontuação: <span id="pontos"> 0 </span>
                </div>

                <div class="recorde"> 
                    Recorde: <span id="recorde"> 0 </span>
                </div>
            </div>

            <canvas id="canvas" widht="400" height="400">
                <!--
                
                <canvas>: é um elemento especial para desenho 2D ou 3D. Por si só, 
                é apenas um retângulo vazio. O JavasScript vai usar o "contexto 2D"
                para desenhar a cobra, e comida, etc   


                -->

             </canvas>
  
            <div class="controles">

                <button onclick="iniciarJogo()">Iniciar Jogo</button>
                <button onclick="pausarJogo()">Pausar / Continuar</button>
            </div>

            <div class="teclas">

                <div class="tecla vazio"></div>
                <div class="tecla">&#9650;</div>
                <div class="tecla vazio"></div>
                <div class="tecla">&#9668;</div>
                <div class="tecla">&#9660;</div>
                <div class="tecla">&#9658;</div>

            </div>

            <div class="instrucoes">
                <h3>Como Jogar:</h3>
                <p>Use as setas do teclado ou os botões acima para controlar a cobra</p>
                <p>Coma as maçãs vermelhas &#127822; para crescer e ganhar pontos</p>
                <p>Não bata nas paredes nem no própio corpo</p>
            </div>
          
        </div> 
        

     
                
            <script>

             function iniciarJogo(){
                console.log('Jogo começou!!!');
            }

             function pausarJogo(){
                 console.log('pausar no Jogo')
            }



        </script>

    </body>
          
</html>
